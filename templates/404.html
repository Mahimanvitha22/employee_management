{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="text-center text-white px-3">
        <i class="bi bi-signpost-split display-1"></i>
        <div class="error-code">404</div>
        <h3 class="mb-3">Oops! Page Not Found</h3>
        <p class="mb-4 opacity-75">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/dashboard/" class="btn btn-light btn-lg px-4">
            <i class="bi bi-house-door"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
